<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Primary Meta Tags -->
    <title>WorkFlat - International Recruitment & Global Job Opportunities | Work Abroad</title>
    <meta name="title" content="WorkFlat - International Recruitment & Global Job Opportunities | Work Abroad" />
    <meta name="description" content="WorkFlat connects qualified professionals with verified overseas job opportunities. Find international jobs with visa sponsorship in healthcare, IT, engineering, and skilled trades. Your trusted partner in global workforce mobility." />
    <meta name="keywords" content="international recruitment, direct hire jobs abroad, healthcare jobs overseas, IT jobs abroad, skilled worker relocation, work overseas, nursing jobs in Ireland, Canada visa sponsorship, international physician jobs, therapist jobs abroad, engineering jobs for immigrants, overseas employment, work in USA, nursing job in UK, global job platform, visa support jobs, relocation assistance" />
    <meta name="author" content="WorkFlat.com" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://workflat.com/" />
    <meta property="og:title" content="WorkFlat - International Recruitment & Global Job Opportunities" />
    <meta property="og:description" content="Connect with top employers worldwide. Find verified overseas jobs with visa sponsorship and relocation assistance." />
    <meta property="og:image" content="https://workflat.com/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://workflat.com/" />
    <meta property="twitter:title" content="WorkFlat - International Recruitment & Global Job Opportunities" />
    <meta property="twitter:description" content="Connect with top employers worldwide. Find verified overseas jobs with visa sponsorship and relocation assistance." />
    <meta property="twitter:image" content="https://workflat.com/og-image.jpg" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://workflat.com/" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#6366f1" />
    
    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "WorkFlat",
      "url": "https://workflat.com",
      "logo": "https://workflat.com/logo.png",
      "description": "International employment and talent mobility company connecting qualified professionals with verified overseas job opportunities.",
      "sameAs": [
        "https://facebook.com/workflat",
        "https://twitter.com/workflat",
        "https://linkedin.com/company/workflat",
        "https://instagram.com/workflat"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-555-123-4567",
        "contactType": "customer service",
        "email": "info@workflat.com"
      }
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "WorkFlat",
      "url": "https://workflat.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://workflat.com/jobs?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
